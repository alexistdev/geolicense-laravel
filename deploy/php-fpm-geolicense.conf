; Pool PHP-FPM untuk geolicense-laravel di droplet 1 GB.
; Pasang di server (menimpa pool www default):
;   sudo cp deploy/php-fpm-geolicense.conf /etc/php/8.4/fpm/pool.d/www.conf
;   sudo systemctl restart php8.4-fpm
;
; pm=ondemand → worker hanya dibuat saat ada request, dilepas saat idle.
; Ideal untuk RAM kecil / trafik rendah.

[www]
user = www-data
group = www-data
listen = /run/php/php8.4-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 6
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Batas memori per worker.
php_admin_value[memory_limit] = 256M

; Upload / body.
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 21M

; OPcache — wajib untuk performa production.
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 96
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.validate_timestamps] = 0   ; kode di-cache; `php artisan optimize`/reload FPM saat deploy

; Jangan bocorkan versi PHP.
php_admin_value[expose_php] = Off

catch_workers_output = yes
