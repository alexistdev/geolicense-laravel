# /etc/nginx/sites-available/geolicense
#
# Server block untuk geolicense-laravel (domain: geolicense.my.id).
#
# Ini versi HTTP:80 saja. Jalankan `certbot --nginx -d geolicense.my.id` setelah aktif —
# certbot otomatis menambah blok 443 + redirect 80->443 + auto-renew.
#
# Pasang:
#   sudo ln -s /etc/nginx/sites-available/geolicense /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name geolicense.my.id;

    root /var/www/geolicense/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml application/xml+rss
               text/javascript image/svg+xml application/font-woff2;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Cache aset statis hasil build Vite (public/build punya hash di nama file)
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Jangan sajikan file tersembunyi (.env, .git, dst)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/geolicense.access.log;
    error_log  /var/log/nginx/geolicense.error.log;
}
